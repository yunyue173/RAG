<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基于 RAG 的智能文档问答系统</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <header class="brand">
            <div class="brand-mark">RAG</div>
            <div class="brand-copy">
                <h1>文档问答</h1>
                <p id="appStatus">加载中</p>
            </div>
        </header>

        <section class="user-panel">
            <button id="profileBtn" class="profile-entry" type="button" title="个人资料">
                <span id="profileAvatar" class="profile-avatar">用</span>
                <span class="profile-copy">
                    <span>个人资料</span>
                    <strong id="currentUser">加载中</strong>
                </span>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="m9 18 6-6-6-6"/>
                </svg>
            </button>
        </section>

        <section class="upload-panel">
            <div class="panel-title">
                <span>文档上传</span>
                <span class="file-types">PDF / TXT</span>
            </div>
            <label class="file-picker">
                <input id="fileInput" type="file" accept=".pdf,.txt,application/pdf,text/plain">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 3v12m0-12 4 4m-4-4-4 4M5 15v3a3 3 0 0 0 3 3h8a3 3 0 0 0 3-3v-3"/>
                </svg>
                <span id="fileName">选择文件</span>
            </label>
            <button id="uploadBtn" class="primary-btn" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2M7 9l5-5 5 5M12 4v12"/>
                </svg>
                <span>上传并解析</span>
            </button>
            <div class="progress" aria-hidden="true">
                <div id="uploadProgress"></div>
            </div>
            <p id="uploadMessage" class="upload-message"></p>
        </section>

        <section class="document-panel">
            <div class="panel-title">
                <span>文档列表</span>
                <div class="panel-actions">
                    <label class="history-search">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <circle cx="11" cy="11" r="7"/>
                            <path d="m21 21-4.3-4.3"/>
                        </svg>
                        <input id="historySearchInput" type="search" placeholder="搜索">
                    </label>
                    <button id="refreshDocsBtn" class="icon-btn" type="button" title="刷新文档">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M21 12a9 9 0 0 1-15.6 6.1M3 12A9 9 0 0 1 18.6 5.9M18 3v5h-5M6 21v-5h5"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div id="historySearchResults" class="history-search-results" hidden></div>
            <div id="documentList" class="document-list"></div>
        </section>
    </aside>

    <main class="chat-pane">
        <header class="chat-header">
            <div>
                <h2 id="activeDocTitle">选择或上传文档</h2>
                <p id="activeDocMeta">当前没有加载文档</p>
            </div>
            <button id="newConversationBtn" class="secondary-btn" type="button" disabled>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 5v14M5 12h14"/>
                </svg>
                <span>新会话</span>
            </button>
        </header>

        <nav id="conversationList" class="conversation-list" aria-label="会话列表"></nav>

        <section id="messages" class="messages" aria-live="polite">
            <div class="empty-state">
                <strong>上传文档后开始提问</strong>
                <span>系统会检索相关原文片段并生成回答。</span>
            </div>
        </section>

        <form id="questionForm" class="composer">
            <textarea id="questionInput" rows="2" placeholder="针对当前文档输入问题" disabled></textarea>
            <div class="composer-tools">
                <label class="topk-control" title="Top-K 是每次提问时检索的相关片段数量。建议 3；越大引用越多，也可能更杂。">
                    <span>Top-K</span>
                    <small>引用片段数</small>
                    <select id="topKSelect">
                        <option value="2">2</option>
                        <option value="3" selected>3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                    </select>
                </label>
                <button id="sendBtn" class="send-btn" type="submit" title="发送问题" disabled>
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="m22 2-7 20-4-9-9-4 20-7Z"/>
                        <path d="M22 2 11 13"/>
                    </svg>
                </button>
            </div>
        </form>
    </main>

    <aside class="reference-pane">
        <header>
            <h2>引用片段</h2>
            <span id="citationCount">0</span>
        </header>
        <div id="citationList" class="citation-list">
            <div class="empty-reference">暂无引用</div>
        </div>
    </aside>
</div>

<script src="/js/app.js"></script>
</body>
</html>
