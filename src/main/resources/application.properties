spring.application.name=rag-doc-qa
server.address=0.0.0.0
server.port=${APP_PORT:8080}

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

rag.storage-dir=${RAG_STORAGE_DIR:./data/rag-store}
rag.chunk-size=500
rag.chunk-overlap=80
rag.top-k=3
rag.embedding-dimension=384

# 真实 LLM 方式 1：OpenAI 兼容接口。
# 推荐用通用环境变量启动：
#   LLM_API_KEY      API 密钥
#   LLM_BASE_URL     接口地址，例如 https://api.openai.com/v1 或 https://api.deepseek.com
#   LLM_CHAT_MODEL   聊天模型，例如 gpt-4o-mini 或 deepseek-chat
# 如果不配置，系统只会使用本地兜底回答，不算真正 LLM。
rag.openai.api-key=${LLM_API_KEY:${OPENAI_API_KEY:}}
rag.openai.base-url=${LLM_BASE_URL:${OPENAI_BASE_URL:https://api.openai.com/v1}}
rag.openai.embedding-model=${LLM_EMBEDDING_MODEL:${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}}
rag.openai.embedding-enabled=${LLM_EMBEDDING_ENABLED:false}
rag.openai.chat-model=${LLM_CHAT_MODEL:${OPENAI_CHAT_MODEL:gpt-4o-mini}}

# 可选：使用本地 Ollama 作为真正 LLM。先安装 Ollama 并执行：
# ollama pull qwen2.5:7b
# 然后把 rag.ollama.enabled 改成 true，重启项目。
rag.ollama.enabled=${OLLAMA_ENABLED:false}
rag.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
rag.ollama.chat-model=${OLLAMA_CHAT_MODEL:qwen2.5:7b}
