name: Deploy RAG Doc QA

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy to server
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build jar
        run: mvn -B clean package -DskipTests

      - name: Configure SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          test -n "$SERVER_HOST"
          test -n "$SERVER_SSH_KEY"
          SERVER_PORT="${SERVER_PORT:-22}"
          mkdir -p ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SERVER_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Upload jar
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          test -n "$SERVER_HOST"
          test -n "$SERVER_USER"
          SERVER_PORT="${SERVER_PORT:-22}"
          scp -i ~/.ssh/deploy_key -P "$SERVER_PORT" \
            target/rag-doc-qa-0.0.1-SNAPSHOT.jar \
            "$SERVER_USER@$SERVER_HOST:/tmp/rag-doc-qa.jar"

      - name: Restart application
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          APP_DIR: ${{ secrets.APP_DIR }}
          SERVICE_NAME: ${{ secrets.SERVICE_NAME }}
        run: |
          test -n "$SERVER_HOST"
          test -n "$SERVER_USER"
          SERVER_PORT="${SERVER_PORT:-22}"
          APP_DIR="${APP_DIR:-/opt/rag-doc-qa}"
          SERVICE_NAME="${SERVICE_NAME:-rag-doc-qa}"
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
            "set -e; \
             sudo mkdir -p '$APP_DIR/current' '$APP_DIR/data/rag-store' '$APP_DIR/logs'; \
             sudo mv /tmp/rag-doc-qa.jar '$APP_DIR/current/rag-doc-qa.jar'; \
             sudo chown -R '$SERVER_USER:$SERVER_USER' '$APP_DIR'; \
             sudo systemctl restart '$SERVICE_NAME'; \
             sudo systemctl status '$SERVICE_NAME' --no-pager -l"
